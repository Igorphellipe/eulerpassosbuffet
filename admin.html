<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Euler Passos Buffet</title>
<link rel="stylesheet" href="./css/admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <p class="header__eyebrow">Área Administrativa</p>
    <h1 class="header__title">Euler <span>Passos</span> Buffet</h1>
    <div class="header__divider"></div>
    <p class="header__sub">Geração de Propostas Comerciais</p>
  </header>

  <!-- ══ CARD 1: DADOS DO CLIENTE & EVENTO ══ -->
  <div class="card">
    <h2 class="card__title">Dados do Cliente &amp; Evento</h2>
    <form id="admin-form" novalidate>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="cliente">Nome do Cliente <span class="req">*</span></label>
          <input type="text" id="cliente" class="form-control" placeholder="Nome completo" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="telefone">Telefone <span class="req">*</span></label>
          <input type="tel" id="telefone" class="form-control" placeholder="(61) 99999-9999" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="email@exemplo.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="local">Local do Evento</label>
          <input type="text" id="local" class="form-control" placeholder="Ex: CENTREJUFE">
        </div>
        <div class="form-group">
          <label class="form-label" for="data-evento">Data do Evento <span class="req">*</span></label>
          <input type="date" id="data-evento" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="horario">Horário de Início</label>
          <input type="time" id="horario" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label" for="duracao">Duração do Evento</label>
          <input type="text" id="duracao" class="form-control" placeholder="Ex: 3 horas">
        </div>
        <div class="form-group">
          <label class="form-label" for="qtd-pessoas">Nº de Convidados <span class="req">*</span></label>
          <input type="number" id="qtd-pessoas" class="form-control" min="1" placeholder="Ex: 100" required>
        </div>
      </div>
    </form>
  </div>

  <!-- ══ CARD 2: SERVIÇO E CARDÁPIO ══ -->
  <div class="card">
    <h2 class="card__title">Serviço &amp; Cardápio</h2>

    <div class="form-group" style="margin-bottom:24px">
      <label class="form-label" for="tipo-servico">Tipo de Serviço <span class="req">*</span></label>
      <select id="tipo-servico" class="form-control">
        <option value="">— Selecione um serviço —</option>
        <option value="coquetel">Coquetel Volante</option>
        <option value="churrasco">Buffet de Churrasco</option>
        <option value="feijoada">Buffet de Feijoada</option>
        <option value="jantar">Buffet de Jantar</option>
        <option value="almoco">Buffet de Almoço</option>
        <option value="crepe">Crepes Gourmet</option>
        <option value="massa">Buffet de Massas</option>
        <option value="boteco">Buffet de Comida de Boteco</option>
        <option value="junina">Buffet de Festa Junina</option>
      </select>
    </div>

    <!-- Editor de cardápio (aparece ao selecionar serviço) -->
    <div id="menu-editor-wrapper" class="hidden">
      <div class="menu-editor" id="menu-editor"></div>
    </div>
  </div>

  <!-- ══ CARD 3: VALORES ══ -->
  <div class="card">
    <h2 class="card__title">Valores &amp; Observações</h2>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="valor-pp">Valor por Pessoa (R$)</label>
        <input type="number" id="valor-pp" class="form-control" min="0" step="0.01" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label" for="valor-total">Valor Total da Proposta (R$) <span class="req">*</span></label>
        <input type="number" id="valor-total" class="form-control" min="0" step="0.01" placeholder="0,00" required>
      </div>
      <div class="form-group form-full">
        <label class="form-label" for="observacoes">Observações Adicionais</label>
        <textarea id="observacoes" class="form-control" rows="3" placeholder="Informações extras sobre a proposta..."></textarea>
      </div>
    </div>

    <div class="form-actions mt-16">
      <button type="button" id="btn-preview" class="btn btn--primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Visualizar Proposta
      </button>
      <button type="button" id="btn-pdf" class="btn btn--secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Gerar PDF
      </button>
      <button type="button" id="btn-limpar" class="btn btn--outline">Limpar</button>
    </div>
  </div>

  <!-- ══ PREVIEW DA PROPOSTA ══ -->
  <div class="preview-wrapper" id="preview-wrapper">
    <div class="card" style="padding:0; overflow:hidden;">
      <h2 class="card__title" style="padding: 28px 40px 0; margin-bottom:0;">Preview da Proposta</h2>
      <div style="padding: 20px 40px 32px;">
        <div id="proposta-doc" class="proposta-doc"></div>
      </div>
    </div>
  </div>

</div><!-- /page -->

<!-- Toast -->
<div class="toast" id="toast"></div>
</body>
<script src="./js/admin.js"></script>
</html>
